name: CI

on:
  push:
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - run: cd apps/api && uv sync
      - run: cd apps/api && uv run ruff check .
      - run: cd apps/api && uv run ruff format --check .
      - run: cd apps/api && uv run basedpyright
      - run: cd apps/api && uv run pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @bilin/web lint
      - run: pnpm --filter @bilin/web typecheck
      - run: pnpm --filter @bilin/web test:run
